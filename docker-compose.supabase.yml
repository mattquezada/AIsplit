# AIsplit with the database on Supabase (project "AIsplit", ref qzvqxmpqktmcohxmiyqw).
#
# Only Postgres is replaced by Supabase — Redis (Celery broker) and MinIO (object
# storage) still run locally, since Supabase exposes neither a broker nor an
# auto-generatable S3 key pair.
#
#   docker compose -f docker-compose.supabase.yml up --build
#
# Requires DATABASE_URL in .env to have the real database password filled in.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'bucket ready';
      "

  backend:
    build:
      context: ./backend
    # `alembic upgrade head` is a no-op here — the Supabase schema is already at
    # revision 0001_init — but it keeps boot behavior identical to the local stack.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    # Use threading pool (lighter than prefork) to reduce memory overhead.
    # Solo mode would be lightest but prevents concurrent task startup.
    command: celery -A app.worker.celery_app.celery worker --loglevel=INFO --pool=threads --concurrency=1
    env_file: .env
    volumes:
      - ./backend:/app
      - modelcache:/root/.cache   # persist the downloaded Demucs model
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  miniodata:
  modelcache:
